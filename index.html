<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wie war das?">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a7090">
<title>Wie war das?</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{height:100%;width:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;
  transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;will-change:transform,opacity;}
.screen.active{transform:translateX(0);opacity:1;pointer-events:auto;}
.screen.hidden{transform:translateX(100%);opacity:0;pointer-events:none;}
.screen.gone{transform:translateX(-100%);opacity:0;pointer-events:none;}

/* START */
.start-inner{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:20px;padding:40px;cursor:pointer;-webkit-user-select:none;user-select:none;}
.start-icon{font-size:100px;line-height:1;}
.start-title{font-size:32px;font-weight:900;color:#fff;text-align:center;letter-spacing:-.5px;}
.start-sub{font-size:16px;color:rgba(255,255,255,.75);text-align:center;}

/* STEP HEADER */
.step-hdr{display:flex;align-items:center;gap:10px;flex-shrink:0;
  padding:max(env(safe-area-inset-top),14px) 14px 8px;}
.back-btn{background:rgba(255,255,255,.2);border:none;border-radius:50%;
  width:38px;height:38px;font-size:20px;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-title{font-size:19px;font-weight:800;color:#fff;flex:1;letter-spacing:-.3px;}

/* PROGRESS DOTS */
.dots{display:flex;gap:8px;justify-content:center;padding:2px 0 8px;flex-shrink:0;}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.3);transition:background .2s;}
.dot.done{background:rgba(255,255,255,.6);}
.dot.active{background:#fff;}

/* HINT */
.hint-bar{font-size:11px;color:rgba(255,255,255,.8);text-align:center;
  padding:0 12px 7px;flex-shrink:0;min-height:20px;}

/* GRID */
.grid{flex:1;display:grid;gap:9px;
  padding:0 10px max(10px,env(safe-area-inset-bottom));min-height:0;}
.grid-3x3{grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);}
.grid-2x2{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);}

/* CARD */
.card{background:#fff;border:3px solid rgba(0,0,0,.07);border-radius:16px;
  display:flex;flex-direction:column;align-items:center;padding:8px 5px 6px;
  cursor:pointer;overflow:hidden;position:relative;
  -webkit-user-select:none;user-select:none;
  transition:border-color .15s,background .15s,transform .1s,box-shadow .15s;}
.card:active{transform:scale(.93);}
.card img{width:100%;flex:1;object-fit:contain;min-height:0;}
.card .lbl{font-size:11px;font-weight:700;text-align:center;line-height:1.25;
  margin-top:4px;color:#222;flex-shrink:0;}
.card.preview{box-shadow:0 0 0 4px rgba(255,200,0,.7);}
.card.chosen{box-shadow:0 0 0 4px rgba(255,255,255,.8);}
.card .badge{position:absolute;top:5px;right:5px;width:22px;height:22px;
  border-radius:50%;border:2.5px solid var(--c,#0a7090);background:#fff;
  display:none;align-items:center;justify-content:center;font-size:12px;font-weight:900;}
.card.preview .badge{display:flex;color:var(--c,#0a7090);}
.card.chosen  .badge{display:flex;background:var(--c,#0a7090);color:#fff;}
.card.empty{background:transparent;border-color:transparent;pointer-events:none;cursor:default;}
.card.empty:active{transform:none;}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(.9)}70%{transform:scale(1.07)}100%{transform:scale(1)}}
.card.popping{animation:pop .3s ease forwards;}

/* SUMMARY */
#screen-summary{background:#f0f0ec;}
.sum-hdr{padding:max(env(safe-area-inset-top),20px) 18px 10px;flex-shrink:0;}
.sum-hdr h2{font-size:25px;font-weight:900;color:#111;letter-spacing:-.5px;}
.sum-hdr p{font-size:13px;color:#aaa;margin-top:3px;}
.sum-rows{flex:1;padding:4px 14px 0;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.sum-row{background:#fff;border-radius:14px;padding:11px 14px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 1px 5px rgba(0,0,0,.06);cursor:pointer;-webkit-user-select:none;user-select:none;}
.sum-row:active{opacity:.7;}
.sum-img{width:56px;height:56px;flex-shrink:0;object-fit:contain;}
.sum-cat{font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:2px;}
.sum-val{font-size:17px;font-weight:800;color:#111;line-height:1.2;}
.sum-sentence{font-size:12px;color:#888;margin-top:2px;}
.sum-footer{padding:10px 12px max(env(safe-area-inset-bottom),16px);
  flex-shrink:0;display:flex;gap:8px;}
.btn-green{flex:1;padding:15px;border-radius:14px;border:none;
  background:#0a7090;color:#fff;font-size:16px;font-weight:700;cursor:pointer;}
.btn-gray{flex:1;padding:15px;border-radius:14px;border:none;
  background:#e0e0e0;color:#444;font-size:16px;font-weight:700;cursor:pointer;}
.btn-green:active,.btn-gray:active{opacity:.7;}
</style>
</head>
<body>

<!-- START -->
<div class="screen active" id="screen-start"
     style="background:linear-gradient(160deg,#1a8aaa,#0a5f75);">
  <div class="start-inner">
    <div class="start-icon">🙋</div>
    <div class="start-title">Ich habe ein Problem</div>
    <div class="start-sub">Tippe hier um zu starten</div>
  </div>
</div>

<!-- STEP 0: Was ist passiert? (3x3, 7 Karten + 2 leer) -->
<div class="screen hidden" id="screen-step-0"
     style="background:linear-gradient(160deg,#0d8fa8,#0a7090);">
  <div class="step-hdr">
    <div></div>
    <span class="step-title">Was ist passiert?</span>
  </div>
  <div class="dots">
    <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="hint-bar" id="hint-0">1× hören &nbsp;·&nbsp; 2× auswählen</div>
  <div class="grid grid-3x3" id="grid-0">
    <button class="card" data-step="0" data-key="streit"><img src="bilder/streit.png" alt=""><span class="lbl">Streit</span><span class="badge"></span></button>
    <button class="card" data-step="0" data-key="wegnehmen"><img src="bilder/wegnehmen.png" alt=""><span class="lbl">Etwas weggenommen</span><span class="badge"></span></button>
    <button class="card" data-step="0" data-key="mitspielen"><img src="bilder/mitspielen.png" alt=""><span class="lbl">Nicht mitspielen</span><span class="badge"></span></button>
    <button class="card" data-step="0" data-key="hauen"><img src="bilder/hauen.png" alt=""><span class="lbl">Gestossen / gehauen</span><span class="badge"></span></button>
    <button class="card" data-step="0" data-key="woerter"><img src="bilder/woerter.png" alt=""><span class="lbl">Böse Wörter</span><span class="badge"></span></button>
    <button class="card" data-step="0" data-key="kaputt"><img src="bilder/kaputt.png" alt=""><span class="lbl">Etwas kaputt gemacht</span><span class="badge"></span></button>
    <button class="card" data-step="0" data-key="weiss"><img src="bilder/weiss.png" alt=""><span class="lbl">Weiss nicht</span><span class="badge"></span></button>
    <div class="card empty"></div>
    <div class="card empty"></div>
  </div>
</div>

<!-- STEP 1: Wer war das? (2x2) -->
<div class="screen hidden" id="screen-step-1"
     style="background:linear-gradient(160deg,#5a44c0,#3f2e98);">
  <div class="step-hdr">
    <button class="back-btn" data-goto="0">&#8592;</button>
    <span class="step-title">Wer war das?</span>
  </div>
  <div class="dots">
    <div class="dot done"></div><div class="dot active"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="hint-bar" id="hint-1">1× hören &nbsp;·&nbsp; 2× auswählen</div>
  <div class="grid grid-2x2" id="grid-1">
    <button class="card" data-step="1" data-key="kind"><img src="bilder/kind.png" alt=""><span class="lbl">Ein Kind</span><span class="badge"></span></button>
    <button class="card" data-step="1" data-key="kinder"><img src="bilder/kinder.png" alt=""><span class="lbl">Mehrere Kinder</span><span class="badge"></span></button>
    <button class="card" data-step="1" data-key="weiss"><img src="bilder/weiss.png" alt=""><span class="lbl">Weiss nicht</span><span class="badge"></span></button>
    <button class="card" data-step="1" data-key="ich"><img src="bilder/ich.png" alt=""><span class="lbl">Ich selber</span><span class="badge"></span></button>
  </div>
</div>

<!-- STEP 2: Wie fühle ich mich? (3x3, 7 Karten + 2 leer) -->
<div class="screen hidden" id="screen-step-2"
     style="background:linear-gradient(160deg,#c87010,#a05008);">
  <div class="step-hdr">
    <button class="back-btn" data-goto="1">&#8592;</button>
    <span class="step-title">Wie fühle ich mich?</span>
  </div>
  <div class="dots">
    <div class="dot done"></div><div class="dot done"></div><div class="dot active"></div><div class="dot"></div>
  </div>
  <div class="hint-bar" id="hint-2">1× hören &nbsp;·&nbsp; 2× auswählen</div>
  <div class="grid grid-3x3" id="grid-2">
    <button class="card" data-step="2" data-key="wuetend"><img src="bilder/wuetend.png" alt=""><span class="lbl">Wütend</span><span class="badge"></span></button>
    <button class="card" data-step="2" data-key="traurig"><img src="bilder/traurig.png" alt=""><span class="lbl">Traurig</span><span class="badge"></span></button>
    <button class="card" data-step="2" data-key="angst"><img src="bilder/angst.png" alt=""><span class="lbl">Angst</span><span class="badge"></span></button>
    <button class="card" data-step="2" data-key="aua"><img src="bilder/aua.png" alt=""><span class="lbl">Wehgetan</span><span class="badge"></span></button>
    <button class="card" data-step="2" data-key="verwirrt"><img src="bilder/verwirrt.png" alt=""><span class="lbl">Verwirrt</span><span class="badge"></span></button>
    <button class="card" data-step="2" data-key="nichtok"><img src="bilder/nichtok.png" alt=""><span class="lbl">Nicht ok</span><span class="badge"></span></button>
    <button class="card" data-step="2" data-key="weiss"><img src="bilder/weiss.png" alt=""><span class="lbl">Weiss nicht</span><span class="badge"></span></button>
    <div class="card empty"></div>
    <div class="card empty"></div>
  </div>
</div>

<!-- STEP 3: Was möchte ich jetzt? (3x3, 7 Karten + 2 leer) -->
<div class="screen hidden" id="screen-step-3"
     style="background:linear-gradient(160deg,#168850,#0c5c34);">
  <div class="step-hdr">
    <button class="back-btn" data-goto="2">&#8592;</button>
    <span class="step-title">Was möchte ich jetzt?</span>
  </div>
  <div class="dots">
    <div class="dot done"></div><div class="dot done"></div><div class="dot done"></div><div class="dot active"></div>
  </div>
  <div class="hint-bar" id="hint-3">1× hören &nbsp;·&nbsp; 2× auswählen</div>
  <div class="grid grid-3x3" id="grid-3">
    <button class="card" data-step="3" data-key="hilfe"><img src="bilder/hilfe.png" alt=""><span class="lbl">Hilfe</span><span class="badge"></span></button>
    <button class="card" data-step="3" data-key="entschuldigung"><img src="bilder/entschuldigung.png" alt=""><span class="lbl">Entschuldigung hören</span><span class="badge"></span></button>
    <button class="card" data-step="3" data-key="ruheraum"><img src="bilder/ruheraum.png" alt=""><span class="lbl">Ruheraum</span><span class="badge"></span></button>
    <button class="card" data-step="3" data-key="zusammen"><img src="bilder/zusammen.png" alt=""><span class="lbl">Zusammen lösen</span><span class="badge"></span></button>
    <button class="card" data-step="3" data-key="allein"><img src="bilder/allein.png" alt=""><span class="lbl">Kurz alleine sein</span><span class="badge"></span></button>
    <button class="card" data-step="3" data-key="reden"><img src="bilder/reden.png" alt=""><span class="lbl">Mit jemandem reden</span><span class="badge"></span></button>
    <button class="card" data-step="3" data-key="weiss"><img src="bilder/weiss.png" alt=""><span class="lbl">Weiss nicht</span><span class="badge"></span></button>
    <div class="card empty"></div>
    <div class="card empty"></div>
  </div>
</div>

<!-- SUMMARY -->
<div class="screen hidden" id="screen-summary">
  <div class="sum-hdr">
    <h2>Das sage ich:</h2>
    <p>Tippe auf eine Zeile um sie nochmals zu hören</p>
  </div>
  <div class="sum-rows" id="sum-rows"></div>
  <div class="sum-footer">
    <button class="btn-green" id="btn-readall">&#9654; Alles vorlesen</button>
    <button class="btn-gray"  id="btn-reset">&#8635; Nochmal</button>
  </div>
</div>

<script>
const CARDS = {
  streit:         {label:"Streit",                sentence:"Es gab Streit.",                              color:"#0a7090", light:"#d6f0f5"},
  wegnehmen:      {label:"Etwas weggenommen",     sentence:"Jemand hat mir etwas weggenommen.",           color:"#0a7090", light:"#d6f0f5"},
  mitspielen:     {label:"Nicht mitspielen",      sentence:"Ich durfte nicht mitspielen.",                color:"#0a7090", light:"#d6f0f5"},
  hauen:          {label:"Gestossen / gehauen",   sentence:"Jemand hat mich gestossen oder gehauen.",     color:"#0a7090", light:"#d6f0f5"},
  woerter:        {label:"Böse Wörter",           sentence:"Jemand hat böse Wörter gesagt.",              color:"#0a7090", light:"#d6f0f5"},
  kaputt:         {label:"Etwas kaputt gemacht",  sentence:"Jemand hat etwas kaputt gemacht.",            color:"#0a7090", light:"#d6f0f5"},
  kind:           {label:"Ein Kind",              sentence:"Es war ein Kind.",                            color:"#4530a0", light:"#e0dbf8"},
  kinder:         {label:"Mehrere Kinder",        sentence:"Es waren mehrere Kinder.",                    color:"#4530a0", light:"#e0dbf8"},
  ich:            {label:"Ich selber",            sentence:"Ich war es selber.",                          color:"#4530a0", light:"#e0dbf8"},
  wuetend:        {label:"Wütend",                sentence:"Ich bin wütend.",                             color:"#a05008", light:"#f8e8cc"},
  traurig:        {label:"Traurig",               sentence:"Ich bin traurig.",                            color:"#a05008", light:"#f8e8cc"},
  angst:          {label:"Angst",                 sentence:"Ich habe Angst.",                             color:"#a05008", light:"#f8e8cc"},
  aua:            {label:"Wehgetan",              sentence:"Es hat mir wehgetan.",                        color:"#a05008", light:"#f8e8cc"},
  verwirrt:       {label:"Verwirrt",              sentence:"Ich bin verwirrt.",                           color:"#a05008", light:"#f8e8cc"},
  nichtok:        {label:"Nicht ok",              sentence:"Das war nicht ok.",                           color:"#a05008", light:"#f8e8cc"},
  hilfe:          {label:"Hilfe",                 sentence:"Ich brauche Hilfe.",                          color:"#0c5c34", light:"#cceedd"},
  entschuldigung: {label:"Entschuldigung hören",  sentence:"Ich möchte eine Entschuldigung hören.",       color:"#0c5c34", light:"#cceedd"},
  ruheraum:       {label:"Ruheraum",              sentence:"Ich möchte in den Ruheraum.",                 color:"#0c5c34", light:"#cceedd"},
  zusammen:       {label:"Zusammen lösen",        sentence:"Ich möchte es zusammen lösen.",               color:"#0c5c34", light:"#cceedd"},
  allein:         {label:"Kurz alleine sein",     sentence:"Ich möchte kurz alleine sein.",               color:"#0c5c34", light:"#cceedd"},
  reden:          {label:"Mit jemandem reden",    sentence:"Ich möchte mit jemandem reden.",              color:"#0c5c34", light:"#cceedd"},
  weiss:          {label:"Weiss nicht",           sentence:"Ich weiss es nicht.",                         color:"#666666", light:"#eeeeee",
    summaries:["Ich weiss nicht was passiert ist.","Ich weiss nicht wer es war.","Ich weiss nicht wie ich mich fühle.","Ich weiss nicht was wir jetzt machen sollen."]},
};

const STEP_TITLES = ["Was ist passiert?","Wer war das?","Wie fühle ich mich?","Was möchte ich jetzt?"];
const STEP_COLORS = ["#0a7090","#4530a0","#a05008","#0c5c34"];
const TOTAL_STEPS = 4;
const chosen      = [null,null,null,null];
const previewing  = [null,null,null,null];
let speechReady   = false;
let voiceDE       = null;

/* ── SPEECH ── */
const PREF_VOICES = ['Anna','Markus','Petra','Yannick','Katja','Helena'];
function loadVoices() {
  if (!window.speechSynthesis) return;
  const vv = speechSynthesis.getVoices();
  if (!vv.length) return;
  for (const name of PREF_VOICES) {
    const v = vv.find(v => v.name === name);
    if (v) { voiceDE = v; return; }
  }
  const de = vv.filter(v => v.lang.startsWith('de'));
  voiceDE = de.find(v => v.localService) || de.find(v => v.lang==='de-DE') || de[0] || null;
}
if (window.speechSynthesis) {
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}
function speak(text, ondone) {
  if (!window.speechSynthesis) { if (ondone) ondone(); return; }
  speechSynthesis.cancel();
  loadVoices();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='de-DE'; u.rate=0.88; u.pitch=1.0;
  if (voiceDE) u.voice=voiceDE;
  if (ondone) u.onend=ondone;
  speechSynthesis.speak(u);
}
function unlockSpeech(cb) {
  if (speechReady) { cb(); return; }
  const u = new SpeechSynthesisUtterance(' ');
  u.volume=0;
  u.onend = ()=>{ speechReady=true; cb(); };
  u.onerror= ()=>{ speechReady=true; cb(); };
  if (window.speechSynthesis) { speechSynthesis.cancel(); speechSynthesis.speak(u); }
  else { speechReady=true; cb(); }
}

/* ── SCREENS ── */
function showScreen(toId) {
  const cur  = document.querySelector('.screen.active');
  const next = document.getElementById(toId);
  if (!next || next===cur) return;
  cur.classList.replace('active','gone');
  next.classList.replace('hidden','active');
  // Read step title aloud when entering a step screen
  const stepMatch = toId.match(/screen-step-(\d+)/);
  if (stepMatch) {
    const stepIdx = parseInt(stepMatch[1]);
    setTimeout(() => speak(STEP_TITLES[stepIdx]), 200);
  }
}
function goBack(toStep) {
  speechSynthesis && speechSynthesis.cancel();
  const fromStep = toStep+1;
  chosen[fromStep]=null; previewing[fromStep]=null;
  resetGrid(fromStep);
  setHint(fromStep,'1× hören &nbsp;·&nbsp; 2× auswählen');
  const cur  = document.querySelector('.screen.active');
  const prev = document.getElementById('screen-step-'+toStep);
  cur.classList.replace('active','hidden');
  prev.classList.replace('gone','active');
}
function resetGrid(step) {
  document.querySelectorAll(`#grid-${step} .card:not(.empty)`).forEach(c=>{
    c.style.borderColor='rgba(0,0,0,.07)';
    c.style.background='#fff';
    c.classList.remove('preview','chosen','popping');
    const b=c.querySelector('.badge'); if(b) b.textContent='';
  });
}
function setHint(step,text) {
  const h=document.getElementById('hint-'+step); if(h) h.innerHTML=text;
}

/* ── CARDS ── */
document.querySelectorAll('.card:not(.empty)').forEach(card=>{
  card.addEventListener('click', function(){
    const step=parseInt(this.dataset.step);
    const key=this.dataset.key;
    const d=CARDS[key];
    this.style.setProperty('--c', d.color);

    if (previewing[step]===this) {
      /* SECOND TAP */
      previewing[step]=null; chosen[step]=key;
      this.classList.remove('preview');
      this.classList.add('chosen','popping');
      const badge=this.querySelector('.badge'); if(badge) badge.textContent='✓';
      this.style.borderColor=d.color; this.style.background=d.light;
      setHint(step,'');
      if(navigator.vibrate) navigator.vibrate([30,20,50]);
      try {
        const ctx=new(window.AudioContext||window.webkitAudioContext)();
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value=880; g.gain.setValueAtTime(0.3,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.18);
        o.start(); o.stop(ctx.currentTime+0.18);
      } catch(e){}
      setTimeout(()=>{
        if(step<TOTAL_STEPS-1) showScreen('screen-step-'+(step+1));
        else { buildSummary(); showScreen('screen-summary'); setTimeout(readAll,600); }
      },400);

    } else {
      /* FIRST TAP */
      if(previewing[step]) {
        const p=previewing[step];
        p.classList.remove('preview');
        p.style.borderColor='rgba(0,0,0,.07)'; p.style.background='#fff';
        const pb=p.querySelector('.badge'); if(pb) pb.textContent='';
      }
      this.classList.remove('chosen'); this.classList.add('preview');
      this.style.borderColor=d.color; this.style.background=d.light;
      const badge=this.querySelector('.badge'); if(badge) badge.textContent='▶';
      previewing[step]=this;
      setHint(step,'Nochmal tippen zum Auswählen ✓');
      if(navigator.vibrate) navigator.vibrate(20);
      speak(d.sentence);
    }
  });
});

/* ── START ── */
document.getElementById('screen-start').addEventListener('click',function(){
  unlockSpeech(()=>{
    speak('Ich habe ein Problem.',()=>showScreen('screen-step-0'));
  });
});

/* ── BACK BUTTONS ── */
document.querySelectorAll('.back-btn').forEach(btn=>{
  btn.addEventListener('click',function(e){
    e.stopPropagation();
    goBack(parseInt(this.dataset.goto));
  });
});

/* ── SUMMARY ── */
function buildSummary() {
  const box=document.getElementById('sum-rows');
  box.innerHTML=chosen.map((key,i)=>{
    if(!key) return '';
    const d=CARDS[key];
    const sumSentence = (key==='weiss' && d.summaries) ? d.summaries[i] : d.sentence;
    const bgColors = ["#d6f0f5","#e0dbf8","#f8e8cc","#cceedd"];
    return `<div class="sum-row" data-sentence="${sumSentence}"
      style="border-left:5px solid ${STEP_COLORS[i]};background:${bgColors[i]};">
      <img class="sum-img" src="bilder/${key}.png" alt="${d.label}">
      <div>
        <div class="sum-cat" style="color:${STEP_COLORS[i]}">${STEP_TITLES[i]}</div>
        <div class="sum-val">${d.label}</div>
        <div class="sum-sentence">${sumSentence}</div>
      </div>
    </div>`;
  }).join('');
  document.querySelectorAll('.sum-row').forEach(row=>{
    row.addEventListener('click',function(){ speak(this.dataset.sentence); });
  });
}
function readAll() {
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const sentences=chosen.filter(Boolean).map(k=>CARDS[k].sentence);
  let i=0;
  function next(){
    if(i>=sentences.length) return;
    const u=new SpeechSynthesisUtterance(sentences[i++]);
    u.lang='de-DE'; u.rate=0.88; u.pitch=1.0;
    if(voiceDE) u.voice=voiceDE;
    u.onend=next; speechSynthesis.speak(u);
  }
  next();
}
document.getElementById('btn-readall').addEventListener('click',readAll);
document.getElementById('btn-reset').addEventListener('click',function(){
  speechSynthesis && speechSynthesis.cancel();
  chosen.fill(null); previewing.fill(null);
  for(let i=0;i<TOTAL_STEPS;i++){
    resetGrid(i);
    setHint(i,'1× hören &nbsp;·&nbsp; 2× auswählen');
    const s=document.getElementById('screen-step-'+i);
    s.classList.remove('active','gone'); s.classList.add('hidden');
  }
  const sum=document.getElementById('screen-summary');
  sum.classList.remove('active','gone'); sum.classList.add('hidden');
  const cur=document.querySelector('.screen.active');
  if(cur){ cur.classList.remove('active'); cur.classList.add('hidden'); }
  const start=document.getElementById('screen-start');
  start.classList.remove('hidden','gone'); start.classList.add('active');
});
</script>
